<!DOCTYPE html>
<html>
<head>

<title>FocusFlow Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="container-fluid vh-100">

<div class="row h-100">


<div class="col-md-6 left-panel">

<div class="overlay-text">
<h1>Master Your Workflow</h1>
<p>BE foused .</p>
</div>

</div>


<div class="col-md-6 d-flex align-items-center justify-content-center">

<div class="login-box">

<h3 class="mb-4">FocusFlow</h3>

<h4>Welcome back</h4>
<p>Please enter your details to sign in</p>

<form onsubmit="loginUser(event)">

<input type="email" id="email" class="form-control mb-3" placeholder="Email Address" required>

<input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-primary w-100">Sign In</button>

</form>

</div>

</div>

</div>

</div>

<script src="login.js"></script>

</body>
</html>
